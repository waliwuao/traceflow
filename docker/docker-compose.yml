version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: traceflow-db
    environment:
      POSTGRES_DB: traceflow
      POSTGRES_USER: traceflow
      POSTGRES_PASSWORD: traceflow_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traceflow -d traceflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: traceflow-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: traceflow
      DB_USER: traceflow
      DB_PASSWORD: traceflow_secret
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: traceflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
